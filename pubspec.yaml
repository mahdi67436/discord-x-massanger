name: nexus_messenger
description: Enterprise Communication Platform - Messenger × Discord × Corporate SaaS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ============== CORE ==============
  flutter_riverpod: ^2.4.9
  get_it: ^7.6.4
  equatable: ^2.0.5
  uuid: ^4.2.1
  intl: ^0.18.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.1
  flutter_localizations:
    sdk: flutter
  
  # ============== FIREBASE ==============
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.7.5
  firebase_crashlytics: ^3.3.7
  firebase_remote_config: ^4.3.7
  cloud_functions: ^4.5.8
  
  # ============== UI ==============
  flutter_animate: ^4.3.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.1
  
  # ============== MESSAGING & MEDIA ==============
  image_picker: ^1.0.5
  video_player: ^2.8.0
  photo_view: ^0.14.0
  file_picker: ^6.1.1
  open_filex: ^4.3.2
  record: ^5.0.4
  just_audio: ^0.9.36
  
  # ============== VOICE & VIDEO ==============
  flutter_webrtc: ^0.11.4
  permission_handler: ^11.1.0
  
  # ============== ENCRYPTION & SECURITY ==============
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  
  # ============== DEEP LINKS & URLS ==============
  url_launcher: ^6.2.2
  app_links: ^5.0.0
  
  # ============== CHARTS & ANALYTICS ==============
  fl_chart: ^0.66.0
  
  # ============== DATE & TIME ==============
  table_calendar: ^3.0.9
  timeago: ^3.5.0
  
  # ============== HTML & MARKDOWN ==============
  flutter_markdown: ^0.6.18
  
  # ============== PUSH NOTIFICATIONS ==============
  flutter_local_notifications: ^16.3.0
  
  # ============== SCROLLING ==============
  scrollable_positioned_list: ^0.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
